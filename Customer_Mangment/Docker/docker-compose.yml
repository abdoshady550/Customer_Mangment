version: '3.9'

services:

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-server

    ports:
      - "5673:5672" 
      - "15673:15672"  

    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

    restart: unless-stopped

volumes:
  rabbitmq_data: